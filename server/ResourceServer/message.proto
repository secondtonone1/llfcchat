syntax = "proto3";

package message;

service VarifyService {
  rpc GetVarifyCode (GetVarifyReq) returns (GetVarifyRsp) {}
}

message GetVarifyReq {
  string email = 1;
}

message GetVarifyRsp {
  int32 error = 1;
  string email = 2;
  string code = 3;
}

message GetChatServerReq {
  int32 uid = 1;
}

message GetChatServerRsp {
  int32 error = 1;
  string host = 2;
  string port = 3;
  string token = 4;
}

message LoginReq{
	int32 uid = 1;
	string token= 2;
}

message LoginRsp {
	int32 error = 1;
	int32 uid = 2;
	string token = 3;
}

service StatusService {
	rpc GetChatServer (GetChatServerReq) returns (GetChatServerRsp) {}
	rpc Login(LoginReq) returns(LoginRsp);
}

message AddFriendReq {
	int32  applyuid = 1;
	string name = 2;
	string desc = 3;
	string icon = 4;
	string nick = 5;
	int32  sex = 6;
	int32  touid = 7;
}

message AddFriendRsp {
	int32 error = 1;
	int32 applyuid = 2;
	int32 touid = 3;
}

message RplyFriendReq {
	int32 rplyuid = 1;
	bool  agree = 2;
	int32 touid = 3;
}

message RplyFriendRsp {
	int32 error = 1;
	int32 rplyuid = 2;
	int32 touid = 3;
}

message SendChatMsgReq{
		int32 fromuid = 1;
		int32 touid = 2;
		string message = 3;
}

message SendChatMsgRsp{
		int32 error = 1;
		int32 fromuid = 2;
		int32 touid = 3;
}

message AddFriendMsg{
	int32 sender_id = 1;
	string unique_id = 2;
	int32 msg_id = 3;
	int32 thread_id = 4;
	string msgcontent = 5;
	int32 status = 6;
}

message AuthFriendReq{
	int32 fromuid = 1;
	int32 touid = 2;
	repeated AddFriendMsg textmsgs = 3;
}

message AuthFriendRsp{
	int32 error = 1;
	int32 fromuid = 2;
	int32 touid = 3;
}

message TextChatMsgReq {
	int32 fromuid = 1;
    int32 touid = 2;
	int32 thread_id = 3;
	repeated TextChatData textmsgs = 4;
}

message TextChatData{
	string unique_id = 1;
	int32 msg_id = 2;
	string msgcontent = 3;
	string chat_time = 4;
}

message TextChatMsgRsp {
	int32 error = 1;
	int32 fromuid = 2;
	int32 touid = 3; 
	int32 thread_id = 4;
	repeated TextChatData textmsgs = 5;
}

message KickUserReq{
	int32 uid = 1;
}

message KickUserRsp{
	int32 error = 1;
	int32 uid = 2;
}

message NotifyChatImgReq{
	int32 from_uid = 1;
	int32 to_uid = 2;
	int32 message_id = 3;
	string file_name = 4;
	int64 total_size = 5;
	int32 thread_id =6;
}

message NotifyChatImgRsp{
	int32 error = 1;
	int32 from_uid = 2;
	int32 to_uid = 3;
	int32 message_id = 4;
	string file_name = 5;
	int64 total_size = 6;
	int32 thread_id =7;
}

service ChatService {
	rpc NotifyAddFriend(AddFriendReq) returns (AddFriendRsp) {}
	rpc RplyAddFriend(RplyFriendReq) returns (RplyFriendRsp) {}
	rpc SendChatMsg(SendChatMsgReq) returns (SendChatMsgRsp) {}
	rpc NotifyAuthFriend(AuthFriendReq) returns (AuthFriendRsp) {}
	rpc NotifyTextChatMsg(TextChatMsgReq) returns (TextChatMsgRsp){}
	rpc NotifyKickUser(KickUserReq) returns (KickUserRsp){}
	rpc NotifyChatImgMsg(NotifyChatImgReq) returns (NotifyChatImgRsp){}
} 



